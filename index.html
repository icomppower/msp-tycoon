<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSP Tycoon</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%AB%3C/text%3E%3C/svg%3E" />
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%; background: #12161c;
      font-family: -apple-system, Segoe UI, Roboto, sans-serif;
      overflow: hidden;
    }
    /* No flex-centering here — Phaser's Scale.CENTER_BOTH positions the
       canvas itself via inline styles; combining the two double-offsets it. */
    #app { width: 100%; height: 100%; position: relative; }
    canvas { image-rendering: auto; }
  </style>
</head>
<body>
  <div id="app"></div>

</body>
